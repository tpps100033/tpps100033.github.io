<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智慧手杖跌倒監測系統</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    body {
      background: linear-gradient(180deg, #f8fbff 0%, #eef4fb 100%);
      color: #1f2937;
      padding: 24px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .header h1 {
      font-size: 32px;
      margin-bottom: 8px;
      color: #111827;
    }

    .header p {
      color: #6b7280;
      font-size: 16px;
    }

    .refresh-btn {
      border: none;
      background: #2563eb;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(37, 99, 235, 0.25);
    }

    .refresh-btn:hover {
      opacity: 0.92;
    }

    .error {
      background: #fff1f2;
      color: #be123c;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 20px;
      display: none;
      border: 1px solid #fecdd3;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card,
    .panel {
      background: rgba(255, 255, 255, 0.96);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(226, 232, 240, 0.8);
    }

    .card-title {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 12px;
    }

    .card-value {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
      word-break: break-word;
    }

    .card-sub {
      margin-top: 8px;
      color: #6b7280;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      gap: 24px;
      margin-bottom: 24px;
    }

    .chart-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .switch-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 50%;
      background: #eef2ff;
      color: #2563eb;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
      line-height: 1;
    }

    .switch-btn:hover {
      background: #dbeafe;
    }

    .footer-note {
      margin-top: 12px;
      font-size: 13px;
      color: #6b7280;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      text-align: left;
      padding: 14px 12px;
      border-bottom: 1px solid #e5e7eb;
      font-size: 14px;
      vertical-align: middle;
    }

    th {
      background: #f9fafb;
      color: #374151;
    }

    tbody tr:hover {
      background: #f8fafc;
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      min-width: 78px;
      text-align: center;
    }

    .badge-yellow {
      background: #fef08a;
      color: #854d0e;
    }

    .badge-orange {
      background: #ffedd5;
      color: #c2410c;
    }

    .badge-red {
      background: #fee2e2;
      color: #b91c1c;
    }

    .badge-gray {
      background: #e5e7eb;
      color: #374151;
    }

    .status-dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      background: #22c55e;
      vertical-align: middle;
    }

    .status-dot.offline {
      background: #dc2626;
    }

    .muted {
      color: #6b7280;
    }

    @media (max-width: 900px) {
      body {
        padding: 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .header h1 {
        font-size: 26px;
      }

      .card-value {
        font-size: 26px;
      }

      .card,
      .panel {
        padding: 18px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="topbar">
      <div class="header">
        <h1>智慧手杖跌倒監測系統</h1>
        <p>查看跌倒紀錄、最新事件與 Railway 系統狀態</p>
      </div>
      <button class="refresh-btn" onclick="init()">重新整理</button>
    </div>

    <div id="errorBox" class="error"></div>

    <div class="cards">
      <div class="card">
        <div class="card-title">今日事件次數</div>
        <div class="card-value" id="todayCount">--</div>
        <div class="card-sub">統計 YELLOW / ORANGE / RED</div>
      </div>

      <div class="card">
        <div class="card-title">最後一次事件時間</div>
        <div class="card-value" id="lastTime" style="font-size: 20px;">--</div>
        <div class="card-sub" id="lastDevice">設備：--</div>
      </div>

      <div class="card">
        <div class="card-title">Railway 系統狀態</div>
        <div class="card-value" id="systemOnlineText">CHECKING</div>
        <div class="card-sub" id="systemStatus">
          <span class="status-dot"></span>系統狀態：檢測中
        </div>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <div class="chart-header">
          <button class="switch-btn" onclick="changeRange(-1)">‹</button>
          <h2 id="chartTitle">本日事件統計</h2>
          <button class="switch-btn" onclick="changeRange(1)">›</button>
        </div>

        <canvas id="levelChart" height="140"></canvas>
        <div class="footer-note" id="chartNote">顯示本日 YELLOW / ORANGE / RED 事件分布</div>
      </div>

      <div class="panel">
        <h2 style="margin-bottom: 16px;">最新事件摘要</h2>
        <div style="line-height: 2;">
          <p><strong>設備 ID：</strong><span id="summaryDevice">--</span></p>
          <p><strong>時間：</strong><span id="summaryTime">--</span></p>
          <p><strong>等級：</strong><span id="summaryLevel">--</span></p>
          <p><strong>備註：</strong><span id="summaryNote">--</span></p>
          <p><strong>電池：</strong><span id="summaryBattery">--</span></p>
          <p><strong>訊號：</strong><span id="summaryRssi">--</span></p>
        </div>
      </div>
    </div>

    <div class="panel">
      <h2 style="margin-bottom: 16px;">最近事件紀錄</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>時間</th>
              <th>設備 ID</th>
              <th>等級</th>
              <th>備註</th>
              <th>電池</th>
              <th>RSSI</th>
            </tr>
          </thead>
          <tbody id="eventsTable">
            <tr>
              <td colspan="6" class="muted">資料載入中...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://smart-cane-backend-production-8504.up.railway.app";

    let chartInstance = null;
    let currentRangeIndex = 0;
    let cachedEvents = [];

    const ranges = [
      {
        key: "day",
        title: "本日事件統計",
        note: "顯示本日 YELLOW / ORANGE / RED 事件分布"
      },
      {
        key: "week",
        title: "本週事件統計",
        note: "顯示本週 YELLOW / ORANGE / RED 事件分布"
      },
      {
        key: "month",
        title: "本月事件統計",
        note: "顯示本月 YELLOW / ORANGE / RED 事件分布"
      }
    ];

    function normalizeLevel(level) {
      return String(level || "").trim().toUpperCase();
    }

    function showError(message) {
      const box = document.getElementById("errorBox");
      box.style.display = "block";
      box.textContent = message;
    }

    function hideError() {
      const box = document.getElementById("errorBox");
      box.style.display = "none";
      box.textContent = "";
    }

    async function fetchJson(url) {
      const res = await fetch(url);

      if (!res.ok) {
        throw new Error(`API 請求失敗：${res.status}`);
      }

      return await res.json();
    }

    async function checkSystemStatus() {
      try {
        const res = await fetch(`${API_BASE}/`, { method: "GET" });

        if (!res.ok) throw new Error("API offline");

        document.getElementById("systemOnlineText").textContent = "ONLINE";
        document.getElementById("systemOnlineText").style.color = "#16a34a";
        document.getElementById("systemStatus").innerHTML =
          `<span class="status-dot"></span>系統狀態：正常運作`;
      } catch (err) {
        document.getElementById("systemOnlineText").textContent = "OFFLINE";
        document.getElementById("systemOnlineText").style.color = "#dc2626";
        document.getElementById("systemStatus").innerHTML =
          `<span class="status-dot offline"></span>系統狀態：無法連線`;
      }
    }

    function formatTime(isoString) {
      if (!isoString) return "--";

      const d = new Date(isoString);

      if (isNaN(d.getTime())) return isoString;

      return d.toLocaleString("zh-TW", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit"
      });
    }

    function levelBadge(level) {
      const lv = normalizeLevel(level);

      if (lv === "YELLOW") {
        return `<span class="badge badge-yellow">YELLOW</span>`;
      }

      if (lv === "ORANGE") {
        return `<span class="badge badge-orange">ORANGE</span>`;
      }

      if (lv === "RED") {
        return `<span class="badge badge-red">RED</span>`;
      }

      return `<span class="badge badge-gray">${lv || "UNKNOWN"}</span>`;
    }

    function filterEventsByRange(events, rangeKey) {
      const now = new Date();

      return events.filter(event => {
        const eventDate = new Date(event.created_at);
        if (isNaN(eventDate.getTime())) return false;

        if (rangeKey === "day") {
          return eventDate.toDateString() === now.toDateString();
        }

        if (rangeKey === "week") {
          const startOfWeek = new Date(now);
          startOfWeek.setDate(now.getDate() - now.getDay());
          startOfWeek.setHours(0, 0, 0, 0);

          const endOfWeek = new Date(startOfWeek);
          endOfWeek.setDate(startOfWeek.getDate() + 7);

          return eventDate >= startOfWeek && eventDate < endOfWeek;
        }

        if (rangeKey === "month") {
          return (
            eventDate.getFullYear() === now.getFullYear() &&
            eventDate.getMonth() === now.getMonth()
          );
        }

        return false;
      });
    }

    function renderChart(yellow, orange, red) {
      const ctx = document.getElementById("levelChart").getContext("2d");

      if (chartInstance) {
        chartInstance.destroy();
      }

      chartInstance = new Chart(ctx, {
        type: "bar",
        data: {
          labels: ["YELLOW", "ORANGE", "RED"],
          datasets: [{
            label: "事件數",
            data: [yellow, orange, red],
            borderWidth: 1,
            borderRadius: 8,
            backgroundColor: [
              "rgba(250, 204, 21, 0.65)",
              "rgba(249, 115, 22, 0.65)",
              "rgba(239, 68, 68, 0.65)"
            ],
            borderColor: [
              "rgba(202, 138, 4, 1)",
              "rgba(194, 65, 12, 1)",
              "rgba(185, 28, 28, 1)"
            ]
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              display: false
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  return `事件數：${context.raw}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                precision: 0
              }
            }
          }
        }
      });
    }

    async function loadRangeStats() {
      if (!cachedEvents.length) {
        cachedEvents = await fetchJson(`${API_BASE}/api/events/recent?limit=100`);
      }

      const range = ranges[currentRangeIndex];
      const filtered = filterEventsByRange(cachedEvents, range.key);

      const yellow = filtered.filter(e => normalizeLevel(e.level) === "YELLOW").length;
      const orange = filtered.filter(e => normalizeLevel(e.level) === "ORANGE").length;
      const red = filtered.filter(e => normalizeLevel(e.level) === "RED").length;

      document.getElementById("chartTitle").textContent = range.title;
      document.getElementById("chartNote").textContent = range.note;

      renderChart(yellow, orange, red);
    }

    function changeRange(direction) {
      currentRangeIndex += direction;

      if (currentRangeIndex < 0) {
        currentRangeIndex = ranges.length - 1;
      }

      if (currentRangeIndex >= ranges.length) {
        currentRangeIndex = 0;
      }

      loadRangeStats();
    }

    function renderEventsTable(events) {
      const tbody = document.getElementById("eventsTable");

      if (!events || events.length === 0) {
        tbody.innerHTML = `
          <tr>
            <td colspan="6" class="muted">目前沒有事件紀錄</td>
          </tr>
        `;
        return;
      }

      tbody.innerHTML = events.map(event => `
        <tr>
          <td>${formatTime(event.created_at)}</td>
          <td>${event.device_id || "--"}</td>
          <td>${levelBadge(event.level)}</td>
          <td>${event.note || "無"}</td>
          <td>${event.battery_v ?? "--"}</td>
          <td>${event.rssi ?? "--"}</td>
        </tr>
      `).join("");
    }

    async function loadDashboard() {
      const data = await fetchJson(`${API_BASE}/api/dashboard`);

      document.getElementById("todayCount").textContent = data.today_count ?? 0;

      if (data.last_event) {
        document.getElementById("lastTime").textContent = formatTime(data.last_event.created_at);
        document.getElementById("lastDevice").textContent =
          `設備：${data.last_event.device_id || "--"}`;

        document.getElementById("summaryDevice").textContent =
          data.last_event.device_id || "--";
        document.getElementById("summaryTime").textContent =
          formatTime(data.last_event.created_at);
        document.getElementById("summaryLevel").innerHTML =
          levelBadge(data.last_event.level);
        document.getElementById("summaryNote").textContent =
          data.last_event.note || "無";
        document.getElementById("summaryBattery").textContent =
          data.last_event.battery_v ?? "--";
        document.getElementById("summaryRssi").textContent =
          data.last_event.rssi ?? "--";
      } else {
        document.getElementById("lastTime").textContent = "--";
        document.getElementById("lastDevice").textContent = "設備：--";

        document.getElementById("summaryDevice").textContent = "--";
        document.getElementById("summaryTime").textContent = "--";
        document.getElementById("summaryLevel").textContent = "--";
        document.getElementById("summaryNote").textContent = "--";
        document.getElementById("summaryBattery").textContent = "--";
        document.getElementById("summaryRssi").textContent = "--";
      }

      renderEventsTable(data.recent_events || []);
    }

    async function loadRecentEvents() {
      const data = await fetchJson(`${API_BASE}/api/events/recent?limit=100`);
      cachedEvents = data || [];
      renderEventsTable(cachedEvents.slice(0, 20));
    }

    async function init() {
      try {
        hideError();
        cachedEvents = [];

        await Promise.all([
          checkSystemStatus(),
          loadDashboard(),
          loadRecentEvents()
        ]);

        await loadRangeStats();
      } catch (err) {
        console.error(err);
        showError("無法載入資料，請確認 Railway API 是否正常，以及 /api/dashboard、/api/events/recent 是否可存取。");
        checkSystemStatus();
      }
    }

    init();
  </script>
</body>
</html>
